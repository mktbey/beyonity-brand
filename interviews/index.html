      --blue:   #3c57e1;
      --yellow: #f8ff76;
      --dark:   #001a64;
      --white:  #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      background: rgba(0,26,100,.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      height: 58px; padding: 0 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .hdr-logo { font-size: 17px; font-weight: 800; letter-spacing: -.4px; }
    .hdr-logo em { color: var(--yellow); font-style: normal; }
    .hdr-right { display: flex; align-items: center; gap: 16px; }
    .save-indicator {
      font-size: 10px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase;
      color: rgba(255,255,255,.22); transition: color .3s;
      display: flex; align-items: center; gap: 5px;
    }
    .save-indicator.saved { color: rgba(120,255,150,.6); }
    .save-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; display: inline-block; }
    .hdr-meta { font-size: 10px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255,255,255,.2); }

    /* ── TABS ── */
    .tab-nav {
      background: rgba(0,20,90,.55);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 0 52px;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,.36);
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      padding: 15px 22px; cursor: pointer; white-space: nowrap;
      transition: color .18s, border-color .18s;
    }
    .tab-btn:hover { color: rgba(255,255,255,.68); }
    .tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }

    .tab-prog {
      font-size: 10px; font-weight: 700;
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.36);
      padding: 2px 8px; border-radius: 20px;
      transition: background .18s, color .18s;
    }
    .tab-btn.active .tab-prog { background: rgba(248,255,118,.14); color: var(--yellow); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    .main { max-width: 800px; margin: 0 auto; padding: 52px 52px 96px; }

    /* GREETING */
    .greeting { margin-bottom: 48px; }
    .region-pill {
      display: inline-flex; align-items: center;
      background: rgba(60,87,225,.18); border: 1px solid rgba(60,87,225,.36);
      color: rgba(255,255,255,.55); font-size: 10px; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase;
      padding: 5px 13px; border-radius: 20px; margin-bottom: 20px;
    }
    .greeting-h { font-size: 44px; font-weight: 800; letter-spacing: -1.8px; line-height: 1.04; margin-bottom: 14px; }
    .greeting-h em { color: var(--yellow); font-style: normal; }
    .greeting-p { font-size: 14px; font-weight: 300; color: rgba(255,255,255,.4); line-height: 1.75; max-width: 520px; }

    /* QUESTIONS */
    .qs-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 44px; }

    .q-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px; padding: 26px 26px 20px;
      transition: border-color .22s, background .22s;
    }
    .q-card:focus-within { border-color: rgba(60,87,225,.42); background: rgba(60,87,225,.04); }

    .q-top { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; }
    .q-num {
      flex-shrink: 0; width: 26px; height: 26px; margin-top: 1px;
      background: var(--blue); border-radius: 50%;
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .q-text { font-size: 14.5px; font-weight: 600; line-height: 1.52; color: rgba(255,255,255,.88); }

    /* TEXTAREA + MIC */
    .ta-wrap { position: relative; margin-bottom: 6px; }
    .q-ta {
      display: block; width: 100%; min-height: 88px;
      background: rgba(0,0,0,.18); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      color: rgba(255,255,255,.84);
      font-family: 'Sora', sans-serif; font-size: 13.5px; font-weight: 300; line-height: 1.72;
      padding: 12px 44px 12px 14px; resize: vertical; outline: none;
      transition: border-color .2s, background .2s;
    }
    .q-ta::placeholder { color: rgba(255,255,255,.14); }
    .q-ta:focus { border-color: rgba(60,87,225,.48); background: rgba(0,0,0,.24); }
    .q-ta.mic-on { border-color: rgba(255,80,80,.45); background: rgba(40,0,0,.18); }

    .mic-btn {
      position: absolute; top: 9px; right: 9px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.38); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .14s, color .14s, border-color .14s;
    }
    .mic-btn:hover { background: rgba(60,87,225,.28); border-color: rgba(60,87,225,.5); color: rgba(255,255,255,.78); }
    .mic-btn.rec {
      background: rgba(255,50,50,.18); border-color: rgba(255,60,60,.5); color: #ff6060;
      animation: mic-pulse 1.2s ease-in-out infinite;
    }
    .mic-btn:disabled { opacity: .22; cursor: default; pointer-events: none; }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,60,60,.35); }
      50%       { box-shadow: 0 0 0 7px rgba(255,60,60,0); }
    }

    .voice-preview {
      font-size: 11.5px; font-weight: 300; color: rgba(248,255,118,.48);
      min-height: 16px; margin-bottom: 2px; font-style: italic; padding-left: 2px;
    }

    /* CHIPS + RATING */
    .q-footer { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; min-width: 0; }
    .chip {
      background: rgba(60,87,225,.1); border: 1px solid rgba(60,87,225,.22);
      color: rgba(255,255,255,.44);
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px; cursor: pointer; white-space: nowrap;
      transition: background .13s, border-color .13s, color .13s;
    }
    .chip:hover { background: rgba(60,87,225,.27); border-color: rgba(60,87,225,.5); color: rgba(255,255,255,.82); }

    .q-rating { display: flex; gap: 2px; flex-shrink: 0; padding-top: 4px; }
    .qstar {
      background: none; border: none; cursor: pointer;
      font-size: 15px; line-height: 1; padding: 2px;
      color: rgba(255,255,255,.12); transition: color .12s, transform .1s;
    }
    .qstar:hover { color: rgba(248,255,118,.5); transform: scale(1.22); }
    .qstar.on { color: var(--yellow); }

    /* FINISH */
    .finish-area {
      text-align: center;
      background: rgba(248,255,118,.04); border: 1px solid rgba(248,255,118,.13);
      border-radius: 20px; padding: 36px;
    }
    .finish-hint { font-size: 12px; font-weight: 300; color: rgba(255,255,255,.26); margin-bottom: 20px; }
    .finish-btn {
      background: var(--yellow); color: var(--dark);
      border: none; font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 800; letter-spacing: .3px;
      padding: 15px 56px; border-radius: 100px; cursor: pointer;
      transition: background .14s, transform .14s, box-shadow .14s;
    }
    .finish-btn:hover { background: #ecf160; transform: translateY(-2px); box-shadow: 0 10px 32px rgba(248,255,118,.2); }
    .finish-btn:active { transform: translateY(0); }

    /* ── CONFIRMATION ── */
    #confirm-view { display: none; max-width: 800px; margin: 0 auto; padding: 68px 52px 96px; }
    #confirm-view.show { display: block; }

    .confirm-top { text-align: center; margin-bottom: 52px; }
    .confirm-icon { font-size: 48px; display: block; margin-bottom: 18px; }
    .confirm-h { font-size: 36px; font-weight: 800; letter-spacing: -1.2px; line-height: 1.1; margin-bottom: 12px; }
    .confirm-h em { color: var(--yellow); font-style: normal; }
    .confirm-p { font-size: 14px; font-weight: 300; color: rgba(255,255,255,.38); }

    .sum-block { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 20px; overflow: hidden; margin-bottom: 14px; }
    .sum-hdr { background: var(--blue); padding: 14px 24px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
    .sum-meta { font-size: 11px; font-weight: 400; opacity: .72; }
    .sum-qa { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,.05); }
    .sum-qa:last-child { border-bottom: none; }
    .sum-qrow { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 4px; }
    .sum-qn { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: rgba(255,255,255,.3); white-space: nowrap; }
    .sum-stars { font-size: 11px; color: var(--yellow); white-space: nowrap; opacity: .85; }
    .sum-qt { font-size: 12px; font-weight: 400; color: rgba(255,255,255,.44); margin-bottom: 6px; line-height: 1.5; }
    .sum-a { font-size: 13.5px; font-weight: 300; line-height: 1.65; color: rgba(255,255,255,.8); }
    .sum-a.empty { color: rgba(255,255,255,.2); font-style: italic; }

    .confirm-actions { display: flex; gap: 12px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
    .btn-yellow {
      background: var(--yellow); color: var(--dark);
      border: none; font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 800; padding: 13px 28px; border-radius: 100px; cursor: pointer;
      transition: background .14s, transform .14s;
    }
    .btn-yellow:hover { background: #ecf160; transform: translateY(-1px); }
    .btn-ghost {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.6);
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      padding: 13px 28px; border-radius: 100px; cursor: pointer;
      transition: background .18s, color .18s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(72px);
      background: rgba(20,20,50,.96); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.78); font-family: 'Sora', sans-serif; font-size: 12.5px; font-weight: 500;
      padding: 10px 20px; border-radius: 100px;
      transition: transform .28s ease, opacity .28s ease; opacity: 0; pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* RESPONSIVE */
    @media (max-width: 660px) {
      .hdr, .tab-nav { padding: 0 20px; }
      .main, #confirm-view { padding: 36px 20px 64px; }
      .greeting-h { font-size: 30px; letter-spacing: -1px; }
      .q-footer { flex-direction: column; }
    }
  </style>
</head>

// ──────────────────────────────────────────────────────
const Speech = (() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let active = null; // { rec, taId }

  function isSupported() { return !!SR; }

  function _cleanup(taId) {
    const btn = document.getElementById('mic-' + taId);
    const ta  = document.getElementById(taId);
    const pre = document.getElementById('pre-' + taId);
    if (btn) { btn.classList.remove('rec'); btn.title = _hint(taId); }
    if (ta)  ta.classList.remove('mic-on');
    if (pre) pre.textContent = '';
  }

  function _hint(taId) {
    const rk = taId.split('-q')[0];
    const lang = REGIONS[rk]?.lang || 'de-DE';
    return lang.startsWith('en') ? 'Speak your answer' : lang.startsWith('es') ? 'Habla tu respuesta' : 'Antwort einsprechen';
  }

  function stop() {
    if (!active) return;
    active.rec.abort();
    _cleanup(active.taId);
    active = null;
  }

  function toggle(taId, lang) {
    if (!SR) { showToast('Sprachaufnahme wird in diesem Browser nicht unterstützt'); return; }
    if (active && active.taId === taId) { stop(); return; }
    stop();

    const rec = new SR();
    rec.lang = lang;
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (e) => {
      const ta  = document.getElementById(taId);
      const pre = document.getElementById('pre-' + taId);
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          const t = e.results[i][0].transcript.trim();
          if (ta) {
            ta.value += (ta.value.trim() ? ' ' : '') + t;
            ta.dispatchEvent(new Event('input'));
          }
          interim = '';
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      if (pre) pre.textContent = interim ? '🎙 ' + interim : '';
    };

    rec.onerror = (e) => {
      if (e.error !== 'aborted') showToast('Mikrofon: ' + e.error);
      stop();
    };
    rec.onend = () => { if (active && active.taId === taId) stop(); };

    try {
      rec.start();
    } catch(e) {
      showToast('Mikrofon konnte nicht gestartet werden');
      return;
    }

    active = { rec, taId };
    const btn = document.getElementById('mic-' + taId);
    const ta  = document.getElementById(taId);
    if (btn) { btn.classList.add('rec'); btn.title = 'Aufnahme stoppen'; }
    if (ta)  ta.classList.add('mic-on');
  }

  return { isSupported, toggle, stop };
})();

// ──────────────────────────────────────────────────────
//  LOCALSTORAGE
// ──────────────────────────────────────────────────────
function lsKey(rk) { return 'beyonity-interview-' + rk; }

function collectData(rk) {
  const r = REGIONS[rk];
  return {
    region:      rk,
    region_name: r.name,
    interviewer: r.who,
    date:        new Date().toISOString().slice(0, 10),
    exported_at: new Date().toISOString(),
    questions:   r.questions.map((q, i) => ({
      index:    i + 1,
      question: q.q,
      answer:   document.getElementById(rk + '-q' + (i+1))?.value.trim() || '',
      rating:   qRatings[rk + '-q' + (i+1)] || 0
    }))
  };
}

function saveRegion(rk) {
  try {
    localStorage.setItem(lsKey(rk), JSON.stringify(collectData(rk)));
    flashSaved();
  } catch(e) {}
}

function loadRegion(rk) {
  try {
    const raw = localStorage.getItem(lsKey(rk));
    if (!raw) return;
    const data = JSON.parse(raw);
    data.questions?.forEach((item, i) => {
      const ta = document.getElementById(rk + '-q' + (i+1));
      if (ta && item.answer) ta.value = item.answer;
      if (item.rating > 0) {
        qRatings[rk + '-q' + (i+1)] = item.rating;
        renderStars(rk, i+1, item.rating);
      }
    });
    updateProgress(rk);
  } catch(e) {}
}

function scheduleSave(rk) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveRegion(rk), 500);
}

function flashSaved() {
  const ind = document.getElementById('save-ind');
  const lbl = document.getElementById('save-lbl');
  if (!ind) return;
  ind.classList.add('saved');
  if (lbl) lbl.textContent = 'Gespeichert ✓';
  setTimeout(() => { ind.classList.remove('saved'); if (lbl) lbl.textContent = 'Autospeichern'; }, 2000);
}

// ──────────────────────────────────────────────────────
//  RENDER
// ──────────────────────────────────────────────────────
const MIC_ICO = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;

function renderTabs() {
  document.getElementById('tab-nav').innerHTML =
    Object.entries(REGIONS).map(([k, r], i) => `
      <button class="tab-btn${i===0?' active':''}" id="tab-${k}" onclick="switchTab('${k}')">
        ${r.label} <span class="tab-prog" id="prog-${k}">0/9</span>
      </button>
    `).join('');
}

function renderQuestion(rk, idx, q) {
  const id   = rk + '-q' + (idx+1);
  const lang = REGIONS[rk].lang;
  const hint = lang.startsWith('en') ? 'Speak your answer' : lang.startsWith('es') ? 'Habla tu respuesta' : 'Antwort einsprechen';
  const micDis = Speech.isSupported() ? '' : 'disabled';

  const chips = q.chips.map(c =>
    `<button class="chip" onclick="addChip('${id}','${c.replace(/'/g,"\\'")}')">+ ${c}</button>`
  ).join('');

  const stars = [1,2,3,4,5].map(v =>
    `<button class="qstar" id="qs-${id}-${v}" onclick="setRating('${rk}',${idx+1},${v})">★</button>`
  ).join('');

  return `
    <div class="q-card">
      <div class="q-top">
        <div class="q-num">${idx+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="ta-wrap">
        <textarea class="q-ta" id="${id}" placeholder="${hint}…"
          oninput="scheduleSave('${rk}'); updateProgress('${rk}')"></textarea>
        <button class="mic-btn" id="mic-${id}" ${micDis}
          title="${hint}" onclick="Speech.toggle('${id}','${lang}')">${MIC_ICO}</button>
      </div>
      <div class="voice-preview" id="pre-${id}"></div>
      <div class="q-footer">
        <div class="chips">${chips}</div>
        <div class="q-rating">${stars}</div>
      </div>
    </div>
  `;
}

function renderPanels() {
  document.getElementById('panels-wrap').innerHTML =
    Object.entries(REGIONS).map(([k, r], i) => `
      <div class="panel${i===0?' active':''}" id="panel-${k}">
        <div class="main">
          <div class="greeting">
            <div class="region-pill">${r.label}</div>
            <h1 class="greeting-h">${r.greeting}</h1>
            <p class="greeting-p">${r.intro}</p>
          </div>
          <div class="qs-list">
            ${r.questions.map((q, idx) => renderQuestion(k, idx, q)).join('')}
          </div>
          <div class="finish-area">
            <p class="finish-hint">Antworten sind lokal gespeichert. "Abschliessen" zeigt die Zusammenfassung und lädt die JSON-Datei herunter.</p>
            <button class="finish-btn" onclick="finish('${k}')">Interview abschliessen →</button>
          </div>
        </div>
      </div>
    `).join('');
}

// ──────────────────────────────────────────────────────
//  INTERACTIONS
// ──────────────────────────────────────────────────────
function switchTab(k) {
  Speech.stop();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + k).classList.add('active');
  document.getElementById('panel-' + k).classList.add('active');
}

function addChip(taId, text) {
  const ta = document.getElementById(taId);
  if (!ta) return;
  ta.value = ta.value.trim() ? ta.value.trim() + '\n· ' + text : '· ' + text;
  ta.dispatchEvent(new Event('input'));
  ta.focus();
}

function setRating(rk, qIdx, v) {
  const key = rk + '-q' + qIdx;
  qRatings[key] = v;
  renderStars(rk, qIdx, v);
  scheduleSave(rk);
}

function renderStars(rk, qIdx, v) {
  const key = rk + '-q' + qIdx;
  for (let i = 1; i <= 5; i++) {
    const s = document.getElementById('qs-' + key + '-' + i);
    if (s) s.classList.toggle('on', i <= v);
  }
}

function updateProgress(rk) {
  const r = REGIONS[rk];
  const n = r.questions.filter((_, i) => {
    const el = document.getElementById(rk + '-q' + (i+1));
    return el && el.value.trim().length > 0;
  }).length;
  const el = document.getElementById('prog-' + rk);
  if (el) el.textContent = n + '/9';
}

// ──────────────────────────────────────────────────────
//  DOWNLOAD JSON
// ──────────────────────────────────────────────────────
function downloadJSON(rk) {
  const data     = collectData(rk);
  const json     = JSON.stringify(data, null, 2);
  const filename = 'interview-' + rk + '-' + data.date + '.json';
  const blob     = new Blob([json], { type: 'application/json' });
  const url      = URL.createObjectURL(blob);
  const a        = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('↓ ' + filename);
}

// ──────────────────────────────────────────────────────
//  FINISH → CONFIRMATION
// ──────────────────────────────────────────────────────
function finish(rk) {
  Speech.stop();
  saveRegion(rk);

  const r    = REGIONS[rk];
  const data = collectData(rk);

  const qaRows = data.questions.map(item => {
    const stars = item.rating > 0
      ? '★'.repeat(item.rating) + '☆'.repeat(5 - item.rating)
      : '—';
    return `
      <div class="sum-qa">
        <div class="sum-qrow">
          <div class="sum-qn">Frage ${item.index}</div>
          <div class="sum-stars">${stars}</div>
        </div>
        <div class="sum-qt">${item.question}</div>
        <div class="sum-a${!item.answer ? ' empty' : ''}">${
          item.answer ? item.answer.replace(/\n/g, '<br>') : 'Keine Antwort'
        }</div>
      </div>
    `;
  }).join('');

  document.getElementById('confirm-view').innerHTML = `
    <div class="confirm-top">
      <span class="confirm-icon">✅</span>
      <h2 class="confirm-h">Danke, <em>${r.who}</em>!</h2>
      <p class="confirm-p">Vollständige Zusammenfassung. JSON wird automatisch heruntergeladen — speichere die Datei in <code style="font-size:11px;opacity:.6">interviews/data/</code>.</p>
    </div>
    <div class="sum-block">
      <div class="sum-hdr">
        <span>${r.label} · ${r.who}</span>
        <span class="sum-meta">${data.date}</span>
      </div>
      ${qaRows}
    </div>
    <div class="confirm-actions">
      <button class="btn-yellow" onclick="downloadJSON('${rk}')">Als JSON exportieren ↓</button>
      <button class="btn-ghost" onclick="resetRegion('${rk}')">← Neues Interview starten</button>
    </div>
  `;

  document.getElementById('interview-view').style.display = 'none';
  document.getElementById('tab-nav').style.display = 'none';
  document.getElementById('confirm-view').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Auto-download
  setTimeout(() => downloadJSON(rk), 300);
}

function resetRegion(rk) {
  if (!confirm('Alle Antworten für diese Region löschen?')) return;
  localStorage.removeItem(lsKey(rk));
  Object.keys(qRatings).forEach(k => { if (k.startsWith(rk + '-')) delete qRatings[k]; });

  document.querySelectorAll('#panel-' + rk + ' .q-ta').forEach(el => { el.value = ''; });
  document.querySelectorAll('#panel-' + rk + ' .qstar').forEach(s => s.classList.remove('on'));
  updateProgress(rk);

  document.getElementById('confirm-view').classList.remove('show');
  document.getElementById('confirm-view').innerHTML = '';
  document.getElementById('interview-view').style.display = '';
  document.getElementById('tab-nav').style.display = '';
  switchTab(rk);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ──────────────────────────────────────────────────────
//  TOAST
// ──────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ──────────────────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderTabs();
  renderPanels();
  Object.keys(REGIONS).forEach(rk => loadRegion(rk));
  if (!Speech.isSupported()) {
    document.querySelectorAll('.mic-btn').forEach(b => { b.disabled = true; });
  }
});
</script>
</body>
</html>
