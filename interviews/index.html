<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyonity · Regional Sales Interview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:      #3c57e1;
      --yellow:    #f8ff76;
      --dark:      #001a64;
      --dark2:     #021470;
      --lightblue: #d8ddf9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--dark);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      background: rgba(0,26,100,.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      height: 60px; padding: 0 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .hdr-logo { font-size: 18px; font-weight: 800; letter-spacing: -.5px; }
    .hdr-logo em { color: var(--yellow); font-style: normal; }
    .hdr-meta { font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,.25); }

    /* ── TAB NAV ── */
    .tab-nav {
      background: rgba(0,20,90,.55);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 0 52px;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-btn {
      display: flex; align-items: center; gap: 9px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,.38);
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      padding: 15px 22px; cursor: pointer; white-space: nowrap;
      transition: color .18s, border-color .18s;
    }
    .tab-btn:hover { color: rgba(255,255,255,.7); }
    .tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }

    .tab-prog {
      font-size: 10px; font-weight: 700;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.38);
      padding: 2px 8px; border-radius: 20px;
      transition: background .18s, color .18s;
    }
    .tab-btn.active .tab-prog { background: rgba(248,255,118,.14); color: var(--yellow); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    .main {
      max-width: 800px; margin: 0 auto;
      padding: 52px 52px 96px;
    }

    /* GREETING */
    .greeting { margin-bottom: 48px; }
    .region-pill {
      display: inline-flex; align-items: center;
      background: rgba(60,87,225,.18); border: 1px solid rgba(60,87,225,.38);
      color: rgba(255,255,255,.55); font-size: 10px; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase;
      padding: 5px 13px; border-radius: 20px; margin-bottom: 20px;
    }
    .greeting-h {
      font-size: 44px; font-weight: 800; letter-spacing: -1.8px;
      line-height: 1.04; margin-bottom: 15px;
    }
    .greeting-h em { color: var(--yellow); font-style: normal; }
    .greeting-p {
      font-size: 14px; font-weight: 300; color: rgba(255,255,255,.4);
      line-height: 1.75; max-width: 520px;
    }

    /* PHASE RATING */
    .rating-block {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px; padding: 28px 32px; margin-bottom: 48px;
    }
    .block-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,.28); margin-bottom: 22px;
    }
    .phases-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
    .phase-col { text-align: center; padding: 0 8px; }
    .phase-col + .phase-col { border-left: 1px solid rgba(255,255,255,.06); }
    .phase-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
      text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 10px;
    }
    .stars { display: flex; justify-content: center; gap: 2px; }
    .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 16px; line-height: 1; padding: 3px;
      color: rgba(255,255,255,.13);
      transition: color .12s, transform .12s;
    }
    .star-btn:hover { color: rgba(248,255,118,.5); transform: scale(1.22); }
    .star-btn.on { color: var(--yellow); transform: scale(1.06); }

    /* QUESTIONS */
    .qs-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 44px; }

    .q-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px; padding: 26px 26px 20px;
      transition: border-color .22s, background .22s;
    }
    .q-card:focus-within {
      border-color: rgba(60,87,225,.45);
      background: rgba(60,87,225,.04);
    }

    .q-top { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; }
    .q-num {
      flex-shrink: 0; width: 26px; height: 26px; margin-top: 1px;
      background: var(--blue); border-radius: 50%;
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .q-text { font-size: 14.5px; font-weight: 600; line-height: 1.52; color: rgba(255,255,255,.88); }

    .q-ta {
      display: block; width: 100%; min-height: 84px;
      background: rgba(0,0,0,.18); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      color: rgba(255,255,255,.84);
      font-family: 'Sora', sans-serif; font-size: 13.5px; font-weight: 300; line-height: 1.72;
      padding: 12px 14px; resize: vertical; outline: none;
      transition: border-color .2s, background .2s; margin-bottom: 13px;
    }
    .q-ta::placeholder { color: rgba(255,255,255,.15); }
    .q-ta:focus { border-color: rgba(60,87,225,.5); background: rgba(0,0,0,.25); }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      background: rgba(60,87,225,.1); border: 1px solid rgba(60,87,225,.22);
      color: rgba(255,255,255,.46);
      font-family: 'Sora', sans-serif; font-size: 11.5px; font-weight: 500;
      padding: 5px 11px; border-radius: 20px; cursor: pointer;
      transition: background .14s, border-color .14s, color .14s;
    }
    .chip:hover { background: rgba(60,87,225,.28); border-color: rgba(60,87,225,.5); color: rgba(255,255,255,.84); }

    /* SUBMIT */
    .submit-area {
      text-align: center;
      background: rgba(248,255,118,.04);
      border: 1px solid rgba(248,255,118,.14);
      border-radius: 20px; padding: 36px;
    }
    .submit-hint {
      font-size: 12px; font-weight: 300; color: rgba(255,255,255,.27);
      margin-bottom: 20px; letter-spacing: .2px;
    }
    .submit-btn {
      background: var(--yellow); color: var(--dark);
      border: none; font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 800; letter-spacing: .3px;
      padding: 15px 56px; border-radius: 100px; cursor: pointer;
      transition: background .14s, transform .14s, box-shadow .14s;
    }
    .submit-btn:hover {
      background: #ecf160; transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(248,255,118,.2);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: .4; cursor: default; transform: none; box-shadow: none; }

    /* ── CONFIRMATION ── */
    #confirm-view { display: none; max-width: 800px; margin: 0 auto; padding: 68px 52px 96px; }
    #confirm-view.show { display: block; }

    .confirm-top { text-align: center; margin-bottom: 56px; }
    .confirm-icon { font-size: 52px; display: block; margin-bottom: 20px; }
    .confirm-h { font-size: 38px; font-weight: 800; letter-spacing: -1.2px; line-height: 1.08; margin-bottom: 12px; }
    .confirm-h em { color: var(--yellow); font-style: normal; }
    .confirm-p { font-size: 14px; font-weight: 300; color: rgba(255,255,255,.38); }

    .sum-block { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 20px; overflow: hidden; margin-bottom: 14px; }
    .sum-hdr { background: var(--blue); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 700; }
    .sum-ratings { font-size: 11px; font-weight: 400; opacity: .72; }
    .sum-qa { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,.05); }
    .sum-qa:last-child { border-bottom: none; }
    .sum-qn { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: rgba(255,255,255,.32); margin-bottom: 3px; }
    .sum-qt { font-size: 12px; font-weight: 400; color: rgba(255,255,255,.48); margin-bottom: 6px; }
    .sum-a { font-size: 13.5px; font-weight: 300; line-height: 1.65; color: rgba(255,255,255,.8); }
    .sum-a.empty { color: rgba(255,255,255,.2); font-style: italic; }

    .confirm-footer { text-align: center; margin-top: 44px; }
    .btn-ghost {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.62);
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      padding: 13px 30px; border-radius: 100px; cursor: pointer;
      transition: background .18s, color .18s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 660px) {
      .hdr, .tab-nav { padding: 0 20px; }
      .main, #confirm-view { padding: 36px 20px 64px; }
      .greeting-h { font-size: 30px; }
      .phases-grid { grid-template-columns: repeat(2, 1fr); row-gap: 20px; }
      .phase-col + .phase-col { border-left: none; }
      .phase-col:nth-child(3), .phase-col:nth-child(4) { border-top: 1px solid rgba(255,255,255,.06); padding-top: 16px; }
    }
  </style>
</head>

function renderTabs() {
  document.getElementById('tab-nav').innerHTML =
    Object.entries(REGIONS).map(([k, r], i) => `
      <button class="tab-btn${i === 0 ? ' active' : ''}" id="tab-${k}" onclick="switchTab('${k}')">

function renderStars(rk, pi) {

    <button class="star-btn" id="s-${rk}-${pi}-${v}" onclick="setRating('${rk}',${pi},${v})">★</button>

}

function renderQuestion(rk, idx, q) {
  const id = `${rk}-q${idx + 1}`;

    </div>
  `;
}

            <div class="phases-grid">
              ${PHASES.map((p, pi) => `
                <div class="phase-col">
                  <div class="phase-lbl">${p}</div>
                  <div class="stars">${renderStars(k, pi)}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="qs-list">
            ${r.questions.map((q, idx) => renderQuestion(k, idx, q)).join('')}
          </div>

          <div class="submit-area">
            <p class="submit-hint">Alle Antworten werden sicher an p.fernandes@beyonity.com übermittelt.</p>
            <button class="submit-btn" id="sbtn-${k}" onclick="doSubmit('${k}')">
              Interview absenden →
            </button>
          </div>

        </div>
      </div>
    `).join('');
}

// ─────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────
function switchTab(k) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${k}`).classList.add('active');
  document.getElementById(`panel-${k}`).classList.add('active');
}

function setRating(rk, pi, v) {
  ratings[rk][pi] = v;
  for (let i = 1; i <= 5; i++) {
    const s = document.getElementById(`s-${rk}-${pi}-${i}`);
    if (s) s.classList.toggle('on', i <= v);
  }
}

function addChip(id, text) {
  const ta = document.getElementById(id);
  if (!ta) return;
  const cur = ta.value.trim();
  ta.value = cur ? cur + '\n· ' + text : '· ' + text;
  ta.focus();
  updateProgress(id.split('-q')[0]);
}

function updateProgress(rk) {
  const r = REGIONS[rk];
  if (!r) return;
  const filled = r.questions.filter((_, i) => {
    const el = document.getElementById(`${rk}-q${i + 1}`);
    return el && el.value.trim().length > 0;
  }).length;
  const el = document.getElementById(`prog-${rk}`);
  if (el) el.textContent = `${filled}/9`;
}

// ─────────────────────────────────────
//  SUBMIT
// ─────────────────────────────────────
async function doSubmit(rk) {
  const r = REGIONS[rk];
  const btn = document.getElementById(`sbtn-${rk}`);
  btn.disabled = true;
  btn.textContent = 'Wird gesendet…';

  const answers = r.questions.map((q, i) => ({
    question: q.q,
    answer: document.getElementById(`${rk}-q${i + 1}`)?.value.trim() || ''
  }));

  const ratingStr = PHASES.map((p, i) => {
    const v = ratings[rk][i];
    return `${p}: ${'★'.repeat(v)}${'☆'.repeat(5 - v)} (${v}/5)`;
  }).join(' | ');

  const payload = {
    _subject: `Beyonity Interview — ${r.name} (${r.who})`,
    region: r.name,
    interviewee: r.who,
    phase_ratings: ratingStr
  };
  answers.forEach((a, i) => {
    payload[`Q${i + 1}`] = `${a.question}\n→ ${a.answer || '(keine Antwort)'}`;
  });

  try {
    const res = await fetch(FORMSPREE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      showConfirmation(rk, answers, ratingStr);
    } else {
      const d = await res.json().catch(() => ({}));
      alert(`Fehler: ${d.error || res.status}. Bitte erneut versuchen.`);
      btn.disabled = false;
      btn.textContent = 'Interview absenden →';
    }
  } catch {
    alert('Netzwerkfehler. Bitte Verbindung prüfen und erneut versuchen.');
    btn.disabled = false;
    btn.textContent = 'Interview absenden →';
  }
}

// ─────────────────────────────────────
//  CONFIRMATION
// ─────────────────────────────────────
function showConfirmation(rk, answers, ratingStr) {
  const r = REGIONS[rk];

  document.getElementById('interview-view').style.display = 'none';
  document.getElementById('tab-nav').style.display = 'none';

  const qaRows = answers.map((a, i) => `
    <div class="sum-qa">
      <div class="sum-qn">Frage ${i + 1}</div>
      <div class="sum-qt">${a.question}</div>
      <div class="sum-a${!a.answer ? ' empty' : ''}">${
        a.answer ? a.answer.replace(/\n/g, '<br>') : 'Keine Antwort'
      }</div>
    </div>
  `).join('');

  document.getElementById('confirm-view').innerHTML = `
    <div class="confirm-top">
      <span class="confirm-icon">✅</span>
      <h2 class="confirm-h">Danke, <em>${r.who}</em>!</h2>
      <p class="confirm-p">Das Interview wurde erfolgreich übermittelt. Hier ist deine Zusammenfassung.</p>
    </div>

    <div class="sum-block">
      <div class="sum-hdr">
        <span>${r.label} · ${r.who}</span>
        <span class="sum-ratings">${ratingStr}</span>
      </div>
      ${qaRows}
    </div>

    <div class="confirm-footer">
      <button class="btn-ghost" onclick="resetAll()">← Neues Interview starten</button>
    </div>
  `;

  document.getElementById('confirm-view').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  document.getElementById('confirm-view').classList.remove('show');
  document.getElementById('confirm-view').innerHTML = '';
  document.getElementById('interview-view').style.display = '';
  document.getElementById('tab-nav').style.display = '';

  document.querySelectorAll('.q-ta').forEach(el => { el.value = ''; });

  Object.keys(ratings).forEach(rk => {
    ratings[rk] = [0,0,0,0];
    for (let pi = 0; pi < 4; pi++)
      for (let v = 1; v <= 5; v++) {
        const s = document.getElementById(`s-${rk}-${pi}-${v}`);
        if (s) s.classList.remove('on');
      }
    updateProgress(rk);
    const btn = document.getElementById(`sbtn-${rk}`);
    if (btn) { btn.disabled = false; btn.textContent = 'Interview absenden →'; }
  });

  switchTab('ch');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────
//  BOOT
// ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderTabs();
  renderPanels();
});
</script>
</body>
</html>
